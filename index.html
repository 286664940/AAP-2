<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>培门冬酶相关胰腺炎风险预测模型</title>

<style>
:root {
    --primary: #2563eb;
    --success: #10b981;
    --warning: #f59e0b;
    --danger: #ef4444;
    --bg: #f1f5f9;
    --card: rgba(255, 255, 255, 0.85);
    --text-main: #1e293b;
    --text-sub: #64748b;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
}

body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

.calculator {
    background: var(--card);
    backdrop-filter: blur(12px);
    border-radius: 24px;
    box-shadow:
        0 20px 25px -5px rgba(0, 0, 0, 0.08),
        0 10px 10px -5px rgba(0, 0, 0, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.3);
    width: 100%;
    max-width: 520px;
    padding: 32px;
}

.header {
    text-align: center;
    margin-bottom: 28px;
}

.header h1 {
    color: var(--text-main);
    font-size: 26px;
    margin-bottom: 8px;
}

.header p {
    color: var(--text-sub);
    font-size: 14px;
}

.input-group {
    margin-bottom: 22px;
}

.input-label {
    display: block;
    margin-bottom: 10px;
    color: var(--text-main);
    font-weight: 600;
    font-size: 15px;
}

.radio-group {
    display: flex;
    gap: 24px;
}

.radio-option {
    display: flex;
    align-items: center;
    cursor: pointer;
    color: var(--text-main);
}

.radio-option input {
    margin-right: 6px;
}

.range-input {
    display: flex;
    align-items: center;
    gap: 14px;
}

.range-slider {
    flex: 1;
    height: 8px;
    -webkit-appearance: none;
    background: linear-gradient(90deg, #e2e8f0, #cbd5e1);
    border-radius: 4px;
    outline: none;
}

.range-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--primary);
    cursor: pointer;
    border: 3px solid white;
    box-shadow: 0 4px 10px rgba(37, 99, 235, 0.3);
    transition: transform 0.2s ease;
}

.range-slider::-webkit-slider-thumb:hover {
    transform: scale(1.15);
}

.range-value {
    min-width: 62px;
    text-align: right;
    font-weight: 600;
    color: var(--text-main);
}

.unit {
    color: var(--text-sub);
    font-size: 13px;
}

.normal-range {
    font-size: 12px;
    color: var(--text-sub);
    margin-top: 6px;
    margin-left: 4px;
}

.result-box {
    background: linear-gradient(135deg, #f0f9ff, #e0f2fe);
    border-radius: 16px;
    padding: 24px;
    text-align: center;
    margin: 30px 0;
}

.prob-value {
    font-size: 46px;
    font-weight: 700;
    color: var(--primary);
}

.risk-bar {
    height: 10px;
    background: #e2e8f0;
    border-radius: 5px;
    margin: 18px 0;
    overflow: hidden;
}

.risk-fill {
    height: 100%;
    width: 0%;
    border-radius: 5px;
    transition: width 0.4s ease, background 0.3s ease;
}

.risk-text {
    font-size: 20px;
    font-weight: 600;
    color: var(--text-main);
}

.buttons {
    display: flex;
    gap: 14px;
}

button {
    flex: 1;
    padding: 14px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.25s ease;
}

.reset-btn {
    background: #e2e8f0;
    color: var(--text-main);
}

.reset-btn:hover {
    background: #cbd5e1;
}

.copy-btn {
    background: var(--primary);
    color: white;
}

.copy-btn:hover {
    background: #1d4ed8;
    transform: translateY(-1px);
}

.footer {
    text-align: center;
    margin-top: 22px;
    color: var(--text-sub);
    font-size: 12px;
}

@media (max-width: 480px) {
    .calculator {
        padding: 20px;
    }

    .header h1 {
        font-size: 22px;
    }

    .prob-value {
        font-size: 38px;
    }
}
</style>
</head>

<body>
<div class="calculator">
    <div class="header">
        <h1>培门冬酶相关胰腺炎风险预测模型</h1>
        <p>基于 Logistic 回归模型预测培门冬酶相关胰腺炎风险</p>
    </div>

    <div class="input-group">
        <label class="input-label">1. 有无 AAP 病史</label>
        <div class="radio-group">
            <label class="radio-option">
                <input type="radio" name="x10" value="0" checked> 无
            </label>
            <label class="radio-option">
                <input type="radio" name="x10" value="1"> 有
            </label>
        </div>
    </div>

    <div class="input-group">
        <label class="input-label">2. 白蛋白 (Albumin)</label>
        <div class="range-input">
            <input type="range" class="range-slider" id="x11" min="20" max="60" value="40" step="0.1">
            <span class="range-value" id="x11-value">40.0</span><span class="unit">g/L</span>
        </div>
        <div class="normal-range">正常范围: 35–55 g/L</div>
    </div>

    <div class="input-group">
        <label class="input-label">3. AST (天门冬氨酸氨基转移酶)</label>
        <div class="range-input">
            <input type="range" class="range-slider" id="x13" min="5" max="200" value="30" step="1">
            <span class="range-value" id="x13-value">30</span><span class="unit">U/L</span>
        </div>
        <div class="normal-range">正常范围: 8–40 U/L</div>
    </div>

    <div class="input-group">
        <label class="input-label">4. TBIL (总胆红素)</label>
        <div class="range-input">
            <input type="range" class="range-slider" id="x14" min="2" max="100" value="15" step="0.1">
            <span class="range-value" id="x14-value">15.0</span><span class="unit">μmol/L</span>
        </div>
        <div class="normal-range">正常范围: 3.4–20.5 μmol/L</div>
    </div>

    <div class="input-group">
        <label class="input-label">5. 血钙 (Blood Calcium)</label>
        <div class="range-input">
            <input type="range" class="range-slider" id="x16" min="1.5" max="3.0" value="2.2" step="0.01">
            <span class="range-value" id="x16-value">2.20</span><span class="unit">mmol/L</span>
        </div>
        <div class="normal-range">正常范围: 2.1–2.6 mmol/L</div>
    </div>

    <div class="input-group">
        <label class="input-label">6. 血糖 (Blood Glucose)</label>
        <div class="range-input">
            <input type="range" class="range-slider" id="x17" min="3.0" max="20.0" value="5.5" step="0.1">
            <span class="range-value" id="x17-value">5.5</span><span class="unit">mmol/L</span>
        </div>
        <div class="normal-range">正常范围: 3.9–6.1 mmol/L</div>
    </div>

    <div class="result-box">
        <div class="prob-value" id="probability">2.3%</div>
        <div class="risk-bar">
            <div class="risk-fill" id="risk-fill"></div>
        </div>
        <div class="risk-text" id="risk-level">低风险</div>
    </div>

    <div class="buttons">
        <button class="reset-btn" onclick="resetValues()">重置</button>
        <button class="copy-btn" onclick="copyResult()">复制结果</button>
    </div>

    <div class="footer">
        <p>模型基于 Logistic 回归分析 | 仅供临床参考</p>
    </div>
</div>

<script>
const coefficients = {
    intercept: 6.3711,
    x10: 2.5839,
    x11: -0.1408,
    x13: 0.0067,
    x14: 0.0388,
    x16: -4.5399,
    x17: 0.5528
};

const x10Inputs = document.getElementsByName('x10');
const x11Input = document.getElementById('x11');
const x13Input = document.getElementById('x13');
const x14Input = document.getElementById('x14');
const x16Input = document.getElementById('x16');
const x17Input = document.getElementById('x17');

const x11Value = document.getElementById('x11-value');
const x13Value = document.getElementById('x13-value');
const x14Value = document.getElementById('x14-value');
const x16Value = document.getElementById('x16-value');
const x17Value = document.getElementById('x17-value');

const probabilityEl = document.getElementById('probability');
const riskLevelEl = document.getElementById('risk-level');
const riskFill = document.getElementById('risk-fill');

function updateValueDisplay() {
    x11Value.textContent = parseFloat(x11Input.value).toFixed(1);
    x13Value.textContent = x13Input.value;
    x14Value.textContent = parseFloat(x14Input.value).toFixed(1);
    x16Value.textContent = parseFloat(x16Input.value).toFixed(2);
    x17Value.textContent = parseFloat(x17Input.value).toFixed(1);
    calculateRisk();
}

function calculateRisk() {
    const x10 = document.querySelector('input[name="x10"]:checked').value;
    const x11 = parseFloat(x11Input.value);
    const x13 = parseFloat(x13Input.value);
    const x14 = parseFloat(x14Input.value);
    const x16 = parseFloat(x16Input.value);
    const x17 = parseFloat(x17Input.value);

    let logOdds = coefficients.intercept;
    logOdds += coefficients.x10 * x10;
    logOdds += coefficients.x11 * x11;
    logOdds += coefficients.x13 * x13;
    logOdds += coefficients.x14 * x14;
    logOdds += coefficients.x16 * x16;
    logOdds += coefficients.x17 * x17;

    const probability = 1 / (1 + Math.exp(-logOdds));
    const percentage = (probability * 100).toFixed(1);

    probabilityEl.textContent = percentage + '%';

    let riskLevel = '低风险';
    if (probability >= 0.05 && probability < 0.2) {
        riskLevel = '中风险';
    } else if (probability >= 0.2) {
        riskLevel = '高风险';
    }
    riskLevelEl.textContent = riskLevel;

    let fillWidth = probability * 100;
    riskFill.style.width = Math.min(fillWidth, 100) + '%';

    if (probability < 0.05) {
        riskFill.style.background = 'var(--success)';
    } else if (probability < 0.2) {
        riskFill.style.background = 'var(--warning)';
    } else {
        riskFill.style.background = 'var(--danger)';
    }
}

function resetValues() {
    document.querySelector('input[name="x10"][value="0"]').checked = true;
    x11Input.value = 40;
    x13Input.value = 30;
    x14Input.value = 15;
    x16Input.value = 2.2;
    x17Input.value = 5.5;
    updateValueDisplay();
}

function copyResult() {
    const x10Text = document.querySelector('input[name="x10"]:checked')
        .nextSibling.textContent.trim();

    const result =
`培门冬酶相关胰腺炎风险评估结果：
AAP病史: ${x10Text}
白蛋白: ${x11Value.textContent} g/L
AST: ${x13Value.textContent} U/L
TBIL: ${x14Value.textContent} μmol/L
血钙: ${x16Value.textContent} mmol/L
血糖: ${x17Value.textContent} mmol/L
预测概率: ${probabilityEl.textContent}
风险等级: ${riskLevelEl.textContent}`;

    navigator.clipboard.writeText(result)
        .then(() => alert('结果已复制到剪贴板！'))
        .catch(err => console.error('复制失败:', err));
}

x10Inputs.forEach(input => input.addEventListener('change', calculateRisk));
[x11Input, x13Input, x14Input, x16Input, x17Input]
    .forEach(input => input.addEventListener('input', updateValueDisplay));

updateValueDisplay();
</script>
</body>
</html>
